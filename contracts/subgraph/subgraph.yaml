specVersion: 0.0.5
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: PoolFactory
    network: base
    source:
      # Replace after deployment — or use `graph deploy` with --network flag
      address: "0x0000000000000000000000000000000000000000"
      abi: PoolFactory
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Pool
        - PoolCreatedEvent
      abis:
        - name: PoolFactory
          file: ../out/PoolFactory.sol/PoolFactory.json
        - name: SusuPool
          file: ../out/SusuPool.sol/SusuPool.json
      eventHandlers:
        - event: PoolCreated(indexed address,indexed address,uint256,uint8,uint256)
          handler: handlePoolCreated
      file: ./src/poolFactory.ts
templates:
  - kind: ethereum
    name: SusuPool
    network: base
    source:
      abi: SusuPool
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Pool
        - Member
      abis:
        - name: SusuPool
          file: ../out/SusuPool.sol/SusuPool.json
      eventHandlers:
        - event: MemberJoined(indexed address,uint256)
          handler: handleMemberJoined
        - event: PoolActivated(uint256)
          handler: handlePoolActivated
        - event: RotationSet(address[])
          handler: handleRotationSet
        - event: ContributionReceived(indexed address,indexed uint256,uint256)
          handler: handleContributionReceived
        - event: PayoutExecuted(indexed address,indexed uint256,uint256,uint256)
          handler: handlePayoutExecuted
        - event: MemberSlashed(indexed address,indexed uint256,uint256)
          handler: handleMemberSlashed
        - event: PoolCompleted(uint256)
          handler: handlePoolCompleted
        - event: DepositReturned(indexed address,uint256)
          handler: handleDepositReturned
      file: ./src/susuPool.ts
