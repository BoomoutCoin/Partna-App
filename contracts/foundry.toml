[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
cache_path = "cache"
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = true
bytecode_hash = "none"
remappings = [
  "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
  "@openzeppelin/contracts-upgradeable/=lib/openzeppelin-contracts-upgradeable/contracts/",
  "@chainlink/contracts/=lib/chainlink-brownie-contracts/contracts/",
  "forge-std/=lib/forge-std/src/",
]

# Dev profile: small fuzz runs so local iteration is fast.
[profile.default.fuzz]
runs = 256
max_test_rejects = 65536

# Pre-audit profile: `forge test --profile audit` runs the full 50k per spec.
[profile.audit.fuzz]
runs = 50000

# Fork tests against Base mainnet
[profile.fork]
via_ir = true
[profile.fork.fuzz]
runs = 1000

[rpc_endpoints]
base = "${BASE_RPC_URL}"
base_sepolia = "${BASE_SEPOLIA_RPC_URL}"

[etherscan]
base = { key = "${BASESCAN_API_KEY}", chain = 8453 }
base_sepolia = { key = "${BASESCAN_API_KEY}", chain = 84532 }
