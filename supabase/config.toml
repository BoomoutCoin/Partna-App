# Supabase local development configuration.
# Docs: https://supabase.com/docs/guides/cli/config

project_id = "partna-wallet"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = false
port = 54329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

# Supabase Auth is NOT the primary identity system for PartNA Wallet.
# We issue our own JWTs from apps/api using wallet-signature auth.
# Supabase Auth is left enabled only for Storage signed-URL flows.
[auth]
enabled = true
site_url = "http://localhost:8081"
additional_redirect_urls = ["partna://"]
jwt_expiry = 3600
enable_signup = false
enable_anonymous_sign_ins = false

[auth.email]
enable_signup = false
double_confirm_changes = false
enable_confirmations = false

[edge_runtime]
enabled = false
